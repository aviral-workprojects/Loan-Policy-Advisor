# HDFC Bank — Personal Loan Eligibility Rules
# Sources: Bank Direct + NoBroker, ClearTax, Loanbaba, Paisabazaar (Mar 2026)
# Rate: 9.98% – 24% p.a. | Loan: ₹50,000 – ₹75 lakh | Tenure: 3 – 72 months
# Key change: min_income updated to ₹25,000 (from ₹20,000) per research
# Key change: min_cibil updated to 600 floor (per NoBroker source 2; 750 for prime rates)
# Special products: Golden Edge (NMI > ₹75,000), Diva (women), 10-second disbursal for pre-approved
# Foreclosure: 2%–4% of outstanding; NOT allowed before 12 EMIs

bank: HDFC
loan_type: personal
logic: all

rules:
  - id: age_min
    field: age
    operator: ">="
    value: 21
    message: "Minimum age is 21 years"

  - id: age_max
    field: age
    operator: "<="
    value: 60
    message: "Maximum age is 60 years at loan maturity"

  - id: monthly_income
    field: monthly_income
    operator: ">="
    value: 25000
    message: "Minimum monthly income is ₹25,000 (₹75,000+ qualifies for Golden Edge premium rates)"

  - id: credit_score
    field: credit_score
    operator: ">="
    value: 700
    message: "Minimum CIBIL score is 700; scores below 750 attract higher interest rates; 750+ for prime pricing"

  - id: employment_type
    field: employment_type
    operator: "in"
    value: ["salaried", "self_employed", "professional", "government"]
    message: "Employment must be salaried, self-employed, professional, or government sector"

  - id: work_experience
    field: work_experience_months
    operator: ">="
    value: 12
    message: "Minimum 12 months employment; 24 months preferred for best rates"

  - id: dti_ratio
    field: dti_ratio
    operator: "<="
    value: 0.50
    message: "Debt-to-income ratio must not exceed 50%; HDFC strictly evaluates all existing EMI obligations"